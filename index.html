<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ Image Ownership Proofer - Perfect!</title>
    
    <!-- PWA REQUIRED TAGS (Added for Speed & App Install) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#28a745">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Proofer">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            max-width: 600px; margin: 0 auto; padding: 20px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .app-container { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #28a745, #20c997); color: white; padding: 25px; text-align: center; }
        .header h1 { font-size: 1.8em; margin-bottom: 5px; }
        .section { padding: 25px; border-bottom: 1px solid #eee; }
        .section:last-child { border-bottom: none; }
        h2 { color: #333; margin-bottom: 20px; font-size: 1.3em; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; transition: border-color 0.3s; }
        input:focus { outline: none; border-color: #28a745; box-shadow: 0 0 10px rgba(40,167,69,0.3); }
        button { width: 100%; padding: 15px; background: linear-gradient(135deg, #28a745, #20c997); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        button:hover:not(:disabled) { transform: translateY(-2px); }
        button:disabled { background: #6c757d; cursor: not-allowed; transform: none; }
        .reset-btn { background: linear-gradient(135deg, #ffc107, #fd7e14) !important; width: auto !important; padding: 12px 25px !important; margin-top: 15px; }
        .preview { text-align: center; margin: 20px 0; }
        .preview img { max-width: 150px; max-height: 150px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); border: 4px solid #28a745; }
        .result { margin: 20px 0; padding: 20px; border-radius: 15px; text-align: center; font-weight: bold; }
        .success { background: linear-gradient(135deg, #d4edda, #c3e6cb); color: #155724; border: 2px solid #28a745; }
        .error { background: linear-gradient(135deg, #f8d7da, #f5c6cb); color: #721c24; border: 2px solid #dc3545; }
        .owner-card { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 25px; border-radius: 20px; margin: 20px 0; }
        .owner-card h3 { margin-bottom: 20px; font-size: 1.5em; text-align: center; }
        .detail { display: flex; justify-content: space-between; margin: 15px 0; padding: 15px; background: rgba(255,255,255,0.2); border-radius: 12px; }
        .detail-label { font-size: 1.1em; opacity: 0.9; }
        .detail-value { background: rgba(255,255,255,0.3); padding: 8px 15px; border-radius: 8px; font-weight: bold; }
        .status-badge { display: inline-block; padding: 10px 20px; border-radius: 25px; font-weight: bold; font-size: 0.9em; margin: 10px 0; }
        .badge-valid { background: #28a745; color: white; }
        .badge-invalid { background: #dc3545; color: white; }
        .hidden { display: none !important; }
        @media (max-width: 480px) { body { padding: 10px; } .header h1 { font-size: 1.4em; } }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>🛡️ Image Ownership Proofer</h1>
            <p>Upload → Protect → Verify (Unlimited)</p>
        </div>

        <!-- EMBED SECTION -->
        <div class="section" id="embedSection">
            <h2>📤 1. Ownership Add Karo</h2>
            <input type="file" id="uploadImg" accept="image/*">
            <input type="text" id="name" placeholder="👤 Aapka Pura Naam">
            <input type="tel" id="mobile" placeholder="📱 Mobile Number (10 digits)">
            <input type="text" id="idnum" placeholder="🆔 Aadhaar / Passport Number">
            <button id="embedBtn" disabled>🔒 Embed & Download Image</button>
            <div id="embedResult" class="result hidden"></div>
            <div id="embedPreview" class="preview hidden"></div>
            <button class="reset-btn" onclick="resetEmbed()" type="button">⟳ Reset Form</button>
        </div>

        <!-- VERIFY SECTION -->
        <div class="section" id="verifySection">
            <h2>🔍 2. Ownership Verify Karo</h2>
            <input type="file" id="verifyImg" accept="image/*">
            <button id="verifyBtn" disabled>✅ Check Owner Details</button>
            
            <div id="verifyPreview" class="preview hidden"></div>
            <div id="verifyResult" class="hidden"></div>
            
            <button class="reset-btn" onclick="resetVerify()" type="button">⟳ Clear & New Image</button>
        </div>
    </div>

    <script>
        // Core Functions
        function strToBin(str) {
            let bin = str.length.toString(2).padStart(32, '0');
            for (let i = 0; i < str.length; i++) {
                bin += str.charCodeAt(i).toString(2).padStart(8, '0');
            }
            return bin;
        }

        function binToStr(binStr) {
            try {
                const len = parseInt(binStr.substring(0, 32), 2);
                let str = '';
                for (let i = 0; i < len; i++) {
                    str += String.fromCharCode(parseInt(binStr.substring(32 + i * 8, 40 + i * 8), 2));
                }
                return JSON.parse(str);
            } catch(e) {
                return null;
            }
        }

        function downloadCanvas(canvas, filename) {
            canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 'image/png');
        }

        // Event Listeners Setup
        function setupListeners() {
            const uploadImg = document.getElementById('uploadImg');
            const verifyImg = document.getElementById('verifyImg');
            const inputs = ['name', 'mobile', 'idnum'];

            uploadImg.addEventListener('change', (e) => {
                if (e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        document.getElementById('embedPreview').innerHTML = `<img src="${ev.target.result}">`;
                        document.getElementById('embedPreview').classList.remove('hidden');
                    };
                    reader.readAsDataURL(e.target.files[0]);
                }
                updateEmbedBtn();
            });

            verifyImg.addEventListener('change', (e) => {
                if (e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        document.getElementById('verifyPreview').innerHTML = `<img src="${ev.target.result}">`;
                        document.getElementById('verifyPreview').classList.remove('hidden');
                    };
                    reader.readAsDataURL(e.target.files[0]);
                }
                document.getElementById('verifyBtn').disabled = false;
            });

            inputs.forEach(id => {
                document.getElementById(id).addEventListener('input', updateEmbedBtn);
            });
        }

        function updateEmbedBtn() {
            const file = document.getElementById('uploadImg').files[0];
            const name = document.getElementById('name').value.trim();
            const mobile = document.getElementById('mobile').value.trim();
            const idnum = document.getElementById('idnum').value.trim();
            document.getElementById('embedBtn').disabled = !(file && name && mobile && idnum);
        }

        // Reset Functions
        function resetEmbed() {
            document.getElementById('uploadImg').value = '';
            document.getElementById('name').value = '';
            document.getElementById('mobile').value = '';
            document.getElementById('idnum').value = '';
            document.getElementById('embedBtn').disabled = true;
            document.getElementById('embedPreview').classList.add('hidden');
            document.getElementById('embedResult').classList.add('hidden');
            updateEmbedBtn();
        }

        function resetVerify() {
            document.getElementById('verifyImg').value = '';
            document.getElementById('verifyBtn').disabled = true;
            document.getElementById('verifyPreview').classList.add('hidden');
            document.getElementById('verifyResult').classList.add('hidden');
        }

        // Embed Data
        document.getElementById('embedBtn').onclick = function() {
            const file = document.getElementById('uploadImg').files[0];
            const name = document.getElementById('name').value.trim();
            const mobile = document.getElementById('mobile').value.trim();
            const idnum = document.getElementById('idnum').value.trim();
            
            const btn = document.getElementById('embedBtn');
            btn.innerText = "⏳ Processing... Please wait";
            btn.disabled = true;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            
            const data = JSON.stringify({name, mobile, idnum, timestamp: Date.now()});
            const binData = strToBin(data);
            
            img.onload = () => {
                try {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const pixels = imageData.data;
                    
                    for (let i = 0; i < binData.length; i++) {
                        const byteIndex = i % 3;
                        const pixelIndex = Math.floor(i / 3) * 12 + byteIndex * 4;
                        if (pixelIndex < pixels.length) {
                            pixels[pixelIndex] = (pixels[pixelIndex] & 0xFE) | parseInt(binData[i]);
                        }
                    }
                    
                    ctx.putImageData(imageData, 0, 0);
                    
                    const finalDataUrl = canvas.toDataURL('image/png');
                    
                    const resultDiv = document.getElementById('embedResult');
                    resultDiv.innerHTML = `
                        ✅ <strong>Success! Ownership Embedded.</strong><br><br>
                        <span style="color:#d35400; font-size:0.9em;">👇 Niche image par <strong>Long Press</strong> karein aur 'Download Image' chunein (Mobile users):</span><br>
                        <img src="${finalDataUrl}" style="max-width:100%; max-height:250px; border-radius:10px; margin-top:10px; border: 3px solid #28a745;">
                        <br><br>
                        <a href="${finalDataUrl}" download="Protected_Ownership.png" style="background:#28a745; color:white; padding:10px 20px; text-decoration:none; border-radius:8px; display:inline-block; margin-bottom:10px;">⬇️ Click Here to Download</a>
                        <br>
                        <small style="color:#721c24; display:block; padding:10px; background:#f8d7da; border-radius:5px; margin-top:10px;">⚠️ <strong>Important Note:</strong> Agar is image ko kisi ko WhatsApp par bhejenge toh ownership delete ho jayegi. Kisi ko bhejna ho toh hamesha <strong>"Document"</strong> banakar bhejein.</small>
                    `;
                    resultDiv.className = 'result success';
                    resultDiv.classList.remove('hidden');
                    
                    downloadCanvas(canvas, `Protected_${Date.now()}.png`);

                } catch (error) {
                    alert("❌ Error: Image shayad bohot badi hai ya format support nahi kar raha. Kripya choti size ki image try karein.");
                    console.error(error);
                } finally {
                    btn.innerText = "🔒 Embed & Download Image";
                    btn.disabled = false;
                }
            };
            
            img.onerror = () => {
                alert("❌ Image load karne mein error aayi. Dusri image try karein.");
                btn.innerText = "🔒 Embed & Download Image";
                btn.disabled = false;
            };
            
            img.src = URL.createObjectURL(file);
        };

        // Verify Data
        document.getElementById('verifyBtn').onclick = function() {
            const file = document.getElementById('verifyImg').files[0];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            
            const btn = document.getElementById('verifyBtn');
            const originalText = btn.innerText;
            btn.innerText = "⏳ Verifying...";
            btn.disabled = true;

            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const pixels = imageData.data;
                let binData = '';
                
                for (let i = 0; i < pixels.length / 12 * 3; i++) {
                    const byteIndex = i % 3;
                    const pixelIndex = Math.floor(i / 3) * 12 + byteIndex * 4;
                    if (pixelIndex < pixels.length) {
                        binData += (pixels[pixelIndex] & 1);
                    }
                }
                
                const ownerData = binToStr(binData);
                
                if (ownerData) {
                    document.getElementById('verifyResult').innerHTML = `
                        <div class="status-badge badge-valid">✅ VALID OWNER FOUND</div>
                        <div class="owner-card">
                            <h3>👑 Ownership Verified!</h3>
                            <div class="detail">
                                <span class="detail-label">👤 Name</span>
                                <span class="detail-value">${ownerData.name}</span>
                            </div>
                            <div class="detail">
                                <span class="detail-label">📱 Mobile</span>
                                <span class="detail-value">${ownerData.mobile}</span>
                            </div>
                            <div class="detail">
                                <span class="detail-label">🆔 ID</span>
                                <span class="detail-value">${ownerData.idnum}</span>
                            </div>
                            <div class="detail">
                                <span class="detail-label">⏰ Created</span>
                                <span class="detail-value">${new Date(ownerData.timestamp).toLocaleString('hi-IN')}</span>
                            </div>
                        </div>
                    `;
                } else {
                    document.getElementById('verifyResult').innerHTML = `
                        <div class="status-badge badge-invalid">❌ NO OWNERSHIP FOUND</div>
                        <div class="result error">
                            <h3>Sorry! This image has no ownership.</h3>
                            <p>Ya toh image original nahi hai, ya WhatsApp/Facebook dwara compress kar di gayi hai. (Original PNG image hi check karein).</p>
                        </div>
                    `;
                }
                
                document.getElementById('verifyResult').classList.remove('hidden');
                
                btn.innerText = originalText;
                btn.disabled = false;
            };
            
            img.src = URL.createObjectURL(file);
        };

        // Initialize App & Setup Service Worker for PWA
        document.addEventListener('DOMContentLoaded', () => {
            setupListeners();
            
            // PWA SERVICE WORKER REGISTRATION (Added for App Install & Speed)
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/sw.js')
                        .then(registration => {
                            console.log('PWA ServiceWorker registered successfully with scope: ', registration.scope);
                        })
                        .catch(err => {
                            console.log('ServiceWorker registration failed: ', err);
                        });
                });
            }
        });
    </script>
</body>
</html>
